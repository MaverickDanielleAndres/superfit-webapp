name: Authenticated UI Scan

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

permissions:
  contents: write
  pull-requests: write
  statuses: write

concurrency:
  group: authenticated-ui-scan-${{ github.ref }}
  cancel-in-progress: false

jobs:
  diaryscan:
    name: Network-Gated Diary Scan E2E
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      secrets_ready: ${{ steps.secrets.outputs.ready }}
      network_available: ${{ steps.net.outputs.available }}
      scan_outcome: ${{ steps.scan.outcome }}
      result: ${{ steps.result.outputs.value }}
    env:
      NEXT_PUBLIC_ENABLE_SUPABASE_AUTH: 'true'
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      USDA_API_KEY: ${{ secrets.USDA_API_KEY }}
      E2E_BASE_URL: http://127.0.0.1:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Validate required secrets
        id: secrets
        shell: bash
        run: |
          set -e
          REQUIRED=(
            NEXT_PUBLIC_SUPABASE_URL
            NEXT_PUBLIC_SUPABASE_ANON_KEY
            SUPABASE_SERVICE_ROLE_KEY
            GEMINI_API_KEY
            USDA_API_KEY
          )

          MISSING=0
          for key in "${REQUIRED[@]}"; do
            if [ -z "${!key}" ]; then
              echo "Missing secret: $key"
              MISSING=1
            fi
          done

          if [ "$MISSING" -eq 0 ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.secrets.outputs.ready == 'true'
        run: npm ci

      - name: Install Playwright Chromium
        if: steps.secrets.outputs.ready == 'true'
        run: npm run playwright:install

      - name: Wait for Supabase DNS and health
        id: net
        if: steps.secrets.outputs.ready == 'true'
        shell: bash
        run: |
          set -e
          HOST="szfviybgscpaxdqmsfxz.supabase.co"
          URL="${NEXT_PUBLIC_SUPABASE_URL}/auth/v1/health"
          AVAILABLE="false"

          for i in $(seq 1 30); do
            if nslookup "$HOST" >/dev/null 2>&1 && curl -sSf "$URL" >/dev/null 2>&1; then
              AVAILABLE="true"
              break
            fi
            echo "Attempt $i/30: Supabase unavailable, retrying in 20s"
            sleep 20
          done

          echo "available=$AVAILABLE" >> "$GITHUB_OUTPUT"

      - name: Run authenticated UI scan
        id: scan
        if: steps.secrets.outputs.ready == 'true' && steps.net.outputs.available == 'true'
        run: npm run test:e2e:scan

      - name: Upload Playwright artifacts
        if: always() && steps.scan.outcome != 'skipped'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts-${{ github.run_id }}
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

      - name: Resolve final result
        id: result
        if: always()
        shell: bash
        run: |
          set -e
          RESULT="failed"

          if [ "${{ steps.secrets.outputs.ready }}" != "true" ]; then
            RESULT="failed"
          elif [ "${{ steps.net.outputs.available }}" != "true" ]; then
            RESULT="failed"
          elif [ "${{ steps.scan.outcome }}" = "success" ]; then
            RESULT="passed"
          else
            RESULT="failed"
          fi

          echo "value=$RESULT" >> "$GITHUB_OUTPUT"

      - name: Enforce scan pass
        if: always() && steps.result.outputs.value != 'passed'
        run: |
          echo "Authenticated UI scan failed or was blocked."
          exit 1

  checkpoint_summary:
    name: Checkpoint Summary and Status
    runs-on: ubuntu-latest
    needs: diaryscan
    if: always()
    steps:
      - name: Build checkpoint summary
        id: summary
        shell: bash
        run: |
          set -e

          RESULT="${{ needs.diaryscan.outputs.result }}"
          if [ "$RESULT" = "passed" ]; then
            STATUS_ICON="✅"
            STATUS_TEXT="PASSED"
          else
            STATUS_ICON="❌"
            STATUS_TEXT="FAILED"
          fi

          SUMMARY_BODY=$(cat <<EOF
          ${STATUS_ICON} Authenticated UI Scan ${STATUS_TEXT}

          - Secrets ready: ${{ needs.diaryscan.outputs.secrets_ready }}
          - Network available: ${{ needs.diaryscan.outputs.network_available }}
          - Scan step outcome: ${{ needs.diaryscan.outputs.scan_outcome }}
          - Final result: ${{ needs.diaryscan.outputs.result }}
          - Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EOF
          )

          {
            echo "### Authenticated UI Scan Checkpoints"
            echo
            echo "$SUMMARY_BODY"
          } >> "$GITHUB_STEP_SUMMARY"

          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$SUMMARY_BODY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Post commit status
        uses: actions/github-script@v7
        with:
          script: |
            const result = `${{ needs.diaryscan.outputs.result }}`;
            const state = result === 'passed' ? 'success' : 'failure';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: context.sha,
              state,
              context: 'Authenticated UI Scan / Checkpoints',
              description: result === 'passed' ? 'All checkpoints passed' : 'One or more checkpoints failed',
              target_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });

      - name: Post pull request comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- superfit-auth-scan-summary -->';
            const summaryBody = JSON.parse(String.raw`${{ toJSON(steps.summary.outputs.body) }}`);
            const body = `${marker}\n${summaryBody}`;
            const issue_number = context.payload.pull_request.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find(c => c.user?.type === 'Bot' && c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body,
              });
            }

      - name: Post commit comment
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: actions/github-script@v7
        with:
          script: |
            const summaryBody = JSON.parse(String.raw`${{ toJSON(steps.summary.outputs.body) }}`);
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: summaryBody,
            });
